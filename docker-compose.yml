version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: xuanshang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: xuanshang
      MYSQL_USER: myuser
      MYSQL_PASSWORD: myuser
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: xuanshang-backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: "django-insecure-CHANGE_ME"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_ENGINE: django.db.backends.mysql
      DATABASE_NAME: xuanshang
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_HOST: db
      DATABASE_PORT: "3306"
    expose:
      - "8000"
    volumes:
      - .:/app
    working_dir: /app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: xuanshang-frontend
    restart: unless-stopped
    expose:
      - "80"
    environment:
      VITE_API_BASE_URL: "/api"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: xuanshang-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    # 不需要额外挂载 default.conf，已在镜像构建时拷贝

volumes:
  db_data:
